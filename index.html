// ── Input ──────────────────────────────────────────────────────────────────
const keys = {};
const justPressed = {};

document.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
    e.preventDefault();
  }
  if (state === 'rescued') { state = 'menu'; return; }
  if (state === 'collection') { state = 'menu'; return; }
  if (state === 'playing' && e.code === 'Escape') { state = 'menu'; return; }
});
document.addEventListener('keyup', e => { delete keys[e.code]; });

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top)  * (H / r.height);
  if (state === 'menu') {
    const idx = cardAt(mx, my);
    if (idx >= 0) { startLevel(idx); return; }
    if (isCollectionBtn(mx, my)) { state = 'collection'; return; }
  } else if (state === 'rescued') {
    state = 'menu';
  } else if (state === 'collection') {
    state = 'menu';
  }
});

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top)  * (H / r.height);
  if (state === 'menu') {
    hoveredCard = cardAt(mx, my);
    hoveredCollBtn = isCollectionBtn(mx, my);
  }
});

// ── Player ────────────────────────────────────────────────────────────────
let player = {};
function initPlayer(idx) {
  const s = LEVELS[idx].start;
  player = { x: s.x, y: s.y, vx: 0, vy: 0, w: 28, h: 40,
             onGround: false, facing: 1, coyoteTime: 0 };
  camera.x = 0;
}

// ── Physics ────────────────────────────────────────────────────────────────
const GRAVITY    = 0.55;
const JUMP_FORCE = -13;
const SPEED      = 5;
const FRICTION   = 0.80;
const ICE_FRIC   = 0.96;

function updateGame() {
  const lvl = LEVELS[currentLevelIdx];

  // Move platforms
  for (const p of lvl.platforms) {
    if (!p.mv) continue;
    p.x += p.vx;
    if (p.x <= p.x0 || p.x + p.w >= p.x1 + p.w) p.vx *= -1;
  }

  // Input
  let mx = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) mx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) mx =  1;
  if (mx !== 0) {
    const acc = lvl.slippery ? 0.5 : 1.4;
    player.vx += mx * acc;
    player.vx = Math.max(-SPEED, Math.min(SPEED, player.vx));
    player.facing = mx;
  } else {
    player.vx *= lvl.slippery ? ICE_FRIC : FRICTION;
    if (Math.abs(player.vx) < 0.05) player.vx = 0;
  }

  // Jump
  const wantsJump = justPressed['ArrowUp'] || justPressed['Space'] || justPressed['KeyW'];
  if (wantsJump && (player.onGround || player.coyoteTime > 0)) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.coyoteTime = 0;
  }

  // Gravity
  player.vy = Math.min(player.vy + GRAVITY, 18);

  // Move X → resolve
  player.x += player.vx;
  player.x = Math.max(0, Math.min(player.x, LW - player.w));
  for (const p of lvl.platforms) {
    if (!overlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) continue;
    const oL = (player.x + player.w) - p.x;
    const oR = (p.x + p.w) - player.x;
    if (oL < oR) { player.x = p.x - player.w; player.vx = 0; }
    else          { player.x = p.x + p.w;      player.vx = 0; }
  }

  // Move Y → resolve
  const wasOnGround = player.onGround;
  player.onGround = false;
  player.y += player.vy;
  for (const p of lvl.platforms) {
    if (!overlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) continue;
    const oT = (player.y + player.h) - p.y;
    const oB = (p.y + p.h) - player.y;
    if (oT < oB) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
      if (p.mv) player.x += p.vx; // ride platform
    } else {
      player.y = p.y + p.h;
      player.vy = Math.max(0, player.vy);
    }
  }

  // Coyote time
  if (wasOnGround && !player.onGround) player.coyoteTime = 8;
  if (player.coyoteTime > 0) player.coyoteTime--;

  // Death / respawn (fall or spikes)
  if (player.y > H + 120) { initPlayer(currentLevelIdx); return; }
  const SW = 16, SH = 16;
  for (const s of lvl.spikes) {
    const sx = s.x, sy = s.y, sw = s.count * SW;
    // Use top half of spike as hitbox
    if (overlap(player.x + 2, player.y + 8, player.w - 4, player.h - 8, sx, sy + 6, sw, SH - 6)) {
      initPlayer(currentLevelIdx); return;
    }
  }

  // Camera
  camera.x = Math.max(0, Math.min(player.x + player.w / 2 - W / 2, LW - W));

  // Check rescue
  const cp = lvl.catPos;
  const dx = (player.x + player.w / 2) - cp.x;
  const dy = (player.y + player.h / 2) - cp.y;
  if (Math.hypot(dx, dy) < 52) {
    rescued.add(currentLevelIdx);
    rescueAnim = 0;
    state = 'rescued';
  }
}

function overlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ── Drawing helpers ────────────────────────────────────────────────────────

function drawCat(cx, cy, scale, cat) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  const { body, mark, eye, pattern } = cat;

  // Tail
  ctx.save();
  ctx.strokeStyle = body;
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(14, -18);
  ctx.quadraticCurveTo(40, -22, 34, -50);
  ctx.stroke();
  ctx.restore();

  // Body
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.roundRect(-17, -38, 34, 30, 8);
  ctx.fill();

  // Belly (calico/tuxedo)
  if (pattern === 'calico' || pattern === 'tuxedo') {
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.ellipse(0, -24, 10, 14, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // Tabby stripes
  if (pattern === 'tabby') {
    ctx.strokeStyle = mark;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.45;
    for (let s = -8; s <= 8; s += 8) {
      ctx.beginPath(); ctx.moveTo(s, -38); ctx.lineTo(s, -10); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Head
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.arc(0, -52, 17, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  for (const side of [-1, 1]) {
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.moveTo(side * 14, -62);
    ctx.lineTo(side * 24, -78);
    ctx.lineTo(side *  6, -68);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFB6C1';
    ctx.globalAlpha = 0.75;
    ctx.beginPath();
    ctx.moveTo(side * 14, -63);
    ctx.lineTo(side * 21, -74);
    ctx.lineTo(side *  8, -67);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Eyes
  ctx.fillStyle = eye;
  ctx.beginPath();
  ctx.ellipse(-6, -54, 4.5, 5, 0, 0, Math.PI * 2);
  ctx.ellipse( 6, -54, 4.5, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(-6, -54, 2, 4, 0, 0, Math.PI * 2);
  ctx.ellipse( 6, -54, 2, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(-5, -55.5, 1.2, 0, Math.PI * 2);
  ctx.arc( 7, -55.5, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#FF9999';
  ctx.beginPath();
  ctx.moveTo(0, -48); ctx.lineTo(-2.5, -51); ctx.lineTo(2.5, -51);
  ctx.closePath(); ctx.fill();

  // Whiskers
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 0.9;
  for (const [sx, sy, ex, ey] of [
    [-3,-48,-20,-44], [-3,-48,-20,-48], [-3,-48,-20,-52],
    [ 3,-48, 20,-44], [ 3,-48, 20,-48], [ 3,-48, 20,-52],
  ]) {
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
  }

  // Mouth
  ctx.strokeStyle = '#CC8888'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-3,-46); ctx.quadraticCurveTo(-6,-43,-8,-44); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo( 3,-46); ctx.quadraticCurveTo( 6,-43, 8,-44); ctx.stroke();

  // Legs & paws
  ctx.fillStyle = body;
  ctx.fillRect(-15, -10, 10, 13);
  ctx.fillRect( -2, -10, 10, 13);
  ctx.beginPath();
  ctx.ellipse(-10, 3, 6, 4, 0, 0, Math.PI * 2);
  ctx.ellipse(  3, 3, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPlayer() {
  const sx = player.x - camera.x;
  const sy = player.y;
  const t  = Date.now() / 100;
  const swing = player.onGround && Math.abs(player.vx) > 0.3 ? Math.sin(t) * 0.18 : 0;

  ctx.save();
  ctx.translate(sx + player.w / 2, sy + player.h);
  if (player.facing < 0) ctx.scale(-1, 1);

  // Left leg
  ctx.save(); ctx.translate(-6, -13); ctx.rotate(swing);
  ctx.fillStyle = '#2C6096';
  ctx.fillRect(-4, 0, 9, 15);
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.ellipse(0, 15, 5.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Right leg
  ctx.save(); ctx.translate(6, -13); ctx.rotate(-swing);
  ctx.fillStyle = '#2C6096';
  ctx.fillRect(-4, 0, 9, 15);
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.ellipse(0, 15, 5.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Body
  ctx.fillStyle = '#4A90D9';
  ctx.beginPath(); ctx.roundRect(-11, -34, 22, 22, 4); ctx.fill();

  // Arms
  ctx.fillStyle = '#3A80C9';
  ctx.save(); ctx.translate(-11, -31); ctx.rotate(-swing);
  ctx.fillRect(-3.5, 0, 7, 13); ctx.restore();
  ctx.save(); ctx.translate(11, -31); ctx.rotate(swing);
  ctx.fillRect(-3.5, 0, 7, 13); ctx.restore();

  // Head
  ctx.fillStyle = '#FDBCB4';
  ctx.beginPath(); ctx.arc(0, -40, 11, 0, Math.PI * 2); ctx.fill();
  // Hair
  ctx.fillStyle = '#4A3728';
  ctx.beginPath(); ctx.arc(0, -44, 11, Math.PI, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-3.5, -40, 1.5, 0, Math.PI*2); ctx.arc(3.5, -40, 1.5, 0, Math.PI*2); ctx.fill();
  // Smile
  ctx.strokeStyle = '#CC8888'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0, -37, 3.5, 0.15, Math.PI - 0.15); ctx.stroke();

  ctx.restore();
}

function drawBackground(lvl) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, lvl.skyA); g.addColorStop(1, lvl.skyB);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  if (lvl.decor === 'meadow') {
    // clouds
    ctx.fillStyle = 'white'; ctx.globalAlpha = 0.85;
    for (const [bx, by] of [[180,60],[540,45],[920,75],[1420,55],[1900,65],[2350,50]]) {
      const cx = bx - camera.x * 0.28;
      if (cx < -160 || cx > W + 160) continue;
      ctx.beginPath();
      ctx.arc(cx,     by,     32, 0, Math.PI*2);
      ctx.arc(cx+38,  by-12,  26, 0, Math.PI*2);
      ctx.arc(cx+70,  by,     30, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // trees
    for (let i = 0; i < 10; i++) {
      const tx = ((i * 277 + 80) % LW) - camera.x;
      if (tx < -50 || tx > W + 50) continue;
      ctx.fillStyle = '#6D4C41'; ctx.fillRect(tx - 5, 390, 10, 60);
      ctx.fillStyle = '#388E3C'; ctx.beginPath(); ctx.arc(tx, 375, 27, 0, Math.PI*2); ctx.fill();
    }
    // flowers
    for (let i = 0; i < 40; i++) {
      const fx = ((i * 113 + 20) % LW) - camera.x;
      if (fx < -8 || fx > W + 8) continue;
      const fy = 432 + (i % 4) * 4;
      ctx.fillStyle = ['#FF6B6B','#FFD700','#FF88CC','#AA88FF'][i % 4];
      ctx.beginPath(); ctx.arc(fx, fy, 4, 0, Math.PI*2); ctx.fill();
    }
  }

  if (lvl.decor === 'night') {
    for (let i = 0; i < 80; i++) {
      const sx = ((i * 97 + 11) % LW) - camera.x * 0.15;
      const sy = ((i * 71 + 7)) % 260;
      if (sx < -3 || sx > W + 3) continue;
      const a = 0.4 + 0.5 * Math.sin(Date.now() / 450 + i);
      ctx.fillStyle = `rgba(255,255,210,${a})`;
      const ss = i % 4 === 0 ? 2.5 : 1.5;
      ctx.fillRect(sx, sy, ss, ss);
    }
    // moon
    const moonX = 640 - camera.x * 0.08;
    ctx.fillStyle = '#FFFACD';
    ctx.beginPath(); ctx.arc(moonX, 75, 38, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = lvl.skyA;
    ctx.beginPath(); ctx.arc(moonX + 14, 65, 32, 0, Math.PI*2); ctx.fill();
    // glowing flowers
    for (let i = 0; i < 25; i++) {
      const fx = ((i * 149 + 40) % LW) - camera.x;
      if (fx < -10 || fx > W + 10) continue;
      const a = 0.45 + 0.35 * Math.sin(Date.now() / 280 + i * 1.3);
      ctx.fillStyle = `rgba(180,90,230,${a})`;
      ctx.beginPath(); ctx.arc(fx, 432, 5, 0, Math.PI*2); ctx.fill();
    }
  }

  if (lvl.decor === 'beach') {
    // ocean background
    ctx.fillStyle = '#005f8f';
    ctx.fillRect(0, 395, W, H - 395);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2;
    for (let wy = 408; wy < H; wy += 14) {
      ctx.beginPath();
      for (let wx = 0; wx <= W; wx += 6) {
        const wvy = wy + Math.sin((wx + camera.x + Date.now() / 25) / 38) * 4;
        wx === 0 ? ctx.moveTo(wx, wvy) : ctx.lineTo(wx, wvy);
      }
      ctx.stroke();
    }
    // clouds
    ctx.fillStyle = 'white'; ctx.globalAlpha = 0.85;
    for (const [bx, by] of [[150,55],[530,40],[950,68],[1480,50],[1950,60]]) {
      const cx = bx - camera.x * 0.28;
      if (cx < -160 || cx > W + 160) continue;
      ctx.beginPath();
      ctx.arc(cx,    by,    30, 0, Math.PI*2);
      ctx.arc(cx+36, by-10, 25, 0, Math.PI*2);
      ctx.arc(cx+66, by,    28, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // palm trees
    for (let i = 0; i < 5; i++) {
      const tx = ((i * 520 + 120) % LW) - camera.x;
      if (tx < -70 || tx > W + 70) continue;
      ctx.strokeStyle = '#7B5533'; ctx.lineWidth = 8; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tx, 450); ctx.bezierCurveTo(tx + 8, 400, tx + 14, 360, tx + 4, 340);
      ctx.stroke();
      ctx.fillStyle = '#2E7D32';
      for (let a = 0; a < 5; a++) {
        ctx.save();
        ctx.translate(tx + 4, 340);
        ctx.rotate((a * Math.PI * 2 / 5) + Math.PI / 5);
        ctx.beginPath();
        ctx.ellipse(22, 0, 24, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  if (lvl.decor === 'snow') {
    // mountains bg
    ctx.fillStyle = '#C8D8E8';
    for (const [mx, mh] of [[300,180],[700,140],[1200,200],[1700,160],[2200,190],[2700,145]]) {
      const sx = mx - camera.x * 0.35;
      if (sx < -200 || sx > W + 200) continue;
      ctx.beginPath();
      ctx.moveTo(sx - 130, 450); ctx.lineTo(sx, mh); ctx.lineTo(sx + 130, 450);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(sx - 42, mh + 90); ctx.lineTo(sx, mh); ctx.lineTo(sx + 42, mh + 90);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#C8D8E8';
    }
    // snowflakes
    for (let i = 0; i < 50; i++) {
      const t = Date.now() / 1000;
      const sx = ((i * 71 + t * 15 * (0.5 + (i % 3) * 0.3)) % (LW)) - camera.x;
      const sy = (t * 38 * (0.6 + (i % 4) * 0.2) + i * 45) % (H + 20) - 10;
      if (sx < -4 || sx > W + 4) continue;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(sx, sy, 3, 3);
    }
    // pine trees
    for (let i = 0; i < 10; i++) {
      const tx = ((i * 270 + 60) % LW) - camera.x;
      if (tx < -50 || tx > W + 50) continue;
      for (let tier = 0; tier < 3; tier++) {
        ctx.fillStyle = '#2E4D2E';
        ctx.beginPath();
        ctx.moveTo(tx, 400 - tier * 32 - 55);
        ctx.lineTo(tx - 22 + tier * 4, 420 - tier * 22);
        ctx.lineTo(tx + 22 - tier * 4, 420 - tier * 22);
        ctx.closePath(); ctx.fill();
      }
      ctx.fillStyle = '#6D4C41'; ctx.fillRect(tx - 4, 420, 8, 30);
    }
  }
}

function drawPlatforms(lvl) {
  for (const p of lvl.platforms) {
    const sx = p.x - camera.x;
    if (sx + p.w < -2 || sx > W + 2) continue;

    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(sx + 4, p.y + 4, p.w, p.h);

    ctx.fillStyle = lvl.platCol;
    ctx.fillRect(sx, p.y, p.w, p.h);

    ctx.fillStyle = lvl.platTop;
    ctx.fillRect(sx, p.y, p.w, 5);

    if (p.mv) {
      ctx.fillStyle = 'rgba(255,255,120,0.25)';
      ctx.fillRect(sx, p.y, p.w, p.h);
    }

    if (lvl.decor === 'snow') {
      // snow cap on top
      ctx.fillStyle = 'rgba(230,245,255,0.55)';
      ctx.fillRect(sx, p.y, p.w, 4);
    }
  }
}

// ── Spikes ────────────────────────────────────────────────────────────────
function drawSpikes(lvl) {
  const SW = 16, SH = 16;
  ctx.fillStyle = lvl.spikeCol;
  for (const s of lvl.spikes) {
    const sx = s.x - camera.x;
    if (sx + s.count * SW < 0 || sx > W) continue;
    for (let i = 0; i < s.count; i++) {
      const tx = sx + i * SW;
      ctx.beginPath();
      ctx.moveTo(tx,        s.y + SH); // bottom-left
      ctx.lineTo(tx + SW/2, s.y);      // tip
      ctx.lineTo(tx + SW,   s.y + SH); // bottom-right
      ctx.closePath();
      ctx.fill();
    }
    // Sheen highlight on each tip
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1;
    for (let i = 0; i < s.count; i++) {
      const tx = sx + i * SW;
      ctx.beginPath();
      ctx.moveTo(tx + SW/2 - 3, s.y + 6);
      ctx.lineTo(tx + SW/2,     s.y + 1);
      ctx.lineTo(tx + SW/2 + 3, s.y + 6);
      ctx.stroke();
    }
  }
}

// ── Menu ─────────────────────────────────────────────────────────────────
const CARD_W = 168, CARD_H = 170;
const GRID_X = W / 2 - CARD_W - 14;
const GRID_Y = 108;

function cardAt(mx, my) {
  for (let i = 0; i < 4; i++) {
    const cx = GRID_X + (i % 2) * (CARD_W + 28);
    const cy = GRID_Y + Math.floor(i / 2) * (CARD_H + 14);
    if (mx >= cx && mx <= cx + CARD_W && my >= cy && my <= cy + CARD_H) return i;
  }
  return -1;
}

function drawMenu() {
  // BG
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a1a3e'); bg.addColorStop(1, '#0d0d1e');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 90; i++) {
    const sx = (i * 97 + 3) % W;
    const sy = (i * 71 + 5) % (H * 0.52);
    const a = 0.2 + 0.6 * Math.sin(Date.now() / 500 + i * 0.7);
    ctx.fillStyle = `rgba(255,255,210,${a})`;
    const ss = i % 5 === 0 ? 2.5 : 1.5;
    ctx.fillRect(sx, sy, ss, ss);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 42px "Courier New"';
  ctx.shadowColor = '#FF8C00'; ctx.shadowBlur = 18;
  ctx.fillText('\u2606 Cat Rescue! \u2606', W / 2, 58);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '13px "Courier New"';
  ctx.fillText('Choose a level to rescue a cat!', W / 2, 84);

  // Cards
  for (let i = 0; i < 4; i++) {
    const cx = GRID_X + (i % 2) * (CARD_W + 28);
    const cy = GRID_Y + Math.floor(i / 2) * (CARD_H + 14);
    const lvl = LEVELS[i];
    const cat = CATS[lvl.catIdx];
    const done = rescued.has(i);
    const hov  = hoveredCard === i;

    // Card BG
    ctx.fillStyle = hov ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.07)';
    ctx.strokeStyle = done ? '#FFD700' : hov ? '#88CCFF' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = done ? 2.5 : 1.5;
    ctx.beginPath(); ctx.roundRect(cx, cy, CARD_W, CARD_H, 10); ctx.fill(); ctx.stroke();

    // Number badge
    ctx.fillStyle = done ? '#FFD700' : 'rgba(255,255,255,0.3)';
    ctx.font = `bold 11px "Courier New"`;
    ctx.textAlign = 'left';
    ctx.fillText(`#${i+1}`, cx + 10, cy + 16);

    // Level name
    ctx.fillStyle = done ? '#FFD700' : '#FFFFFF';
    ctx.font = 'bold 13px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(lvl.name, cx + CARD_W / 2, cy + 22);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '10px "Courier New"';
    ctx.fillText(lvl.desc, cx + CARD_W / 2, cy + 36);
    if (lvl.slippery) {
      ctx.fillStyle = '#88CCFF';
      ctx.fillText('(icy!)', cx + CARD_W / 2, cy + 48);
    }

    // Cat drawing
    const savedAlpha = ctx.globalAlpha;
    ctx.globalAlpha = done ? 1 : 0.55;
    drawCat(cx + CARD_W / 2, cy + 120, 0.60, cat);
    ctx.globalAlpha = savedAlpha;

    // Cat name
    ctx.fillStyle = done ? '#FFD700' : 'rgba(255,255,255,0.55)';
    ctx.font = `${done ? 'bold ' : ''}11px "Courier New"`;
    ctx.textAlign = 'center';
    ctx.fillText(done ? `\u2713 ${cat.name} rescued!` : cat.name, cx + CARD_W / 2, cy + 148);

    // Play button
    const btnY = cy + CARD_H - 26;
    ctx.fillStyle = hov ? '#4CAF50' : '#2E7D32';
    ctx.beginPath(); ctx.roundRect(cx + 28, btnY, CARD_W - 56, 22, 5); ctx.fill();
    ctx.fillStyle = 'white';
    ctx.font = 'bold 11px "Courier New"';
    ctx.fillText('\u25BA PLAY', cx + CARD_W / 2, btnY + 15);
  }
  // Collection button
  const cb = COLL_BTN;
  ctx.fillStyle = hoveredCollBtn ? '#9C27B0' : 'rgba(100,30,120,0.75)';
  ctx.strokeStyle = rescued.size > 0 ? '#FFD700' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = rescued.size > 0 ? 2 : 1;
  ctx.beginPath(); ctx.roundRect(cb.x, cb.y, cb.w, cb.h, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 13px "Courier New"';
  ctx.textAlign = 'center';
  const collLabel = rescued.size > 0 ? `\u2665 My Cats (${rescued.size}/${CATS.length})` : '\u2665 My Cats';
  ctx.fillText(collLabel, W / 2, cb.y + 20);

  ctx.textAlign = 'left';
}

// ── Rescued screen ────────────────────────────────────────────────────────
function drawRescued() {
  rescueAnim++;
  const lvl   = LEVELS[currentLevelIdx];
  const cat   = CATS[lvl.catIdx];
  const t     = Date.now() / 1000;

  // BG
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a3a1a'); bg.addColorStop(1, '#0a1a0a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Confetti
  for (let i = 0; i < 35; i++) {
    const age  = (t * 0.9 + i * 0.25) % 3.5;
    const px   = (i * 89 + 55) % W;
    const py   = H - age * (H / 3.2) - 30;
    ctx.fillStyle = ['#FFD700','#FF6B6B','#4CAF50','#4FC3F7','#FF88CC'][i % 5];
    ctx.globalAlpha = Math.max(0, 1 - age / 2.5);
    ctx.save(); ctx.translate(px, py); ctx.rotate(age * 6 + i);
    ctx.fillRect(-4.5, -4.5, 9, 9); ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Text
  ctx.textAlign = 'center';
  ctx.shadowColor = '#FF8C00'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 36px "Courier New"';
  ctx.fillText('You rescued', W / 2, 78);
  ctx.fillStyle = cat.body;
  ctx.font = 'bold 48px "Courier New"';
  ctx.fillText(cat.name + '!', W / 2, 128);
  ctx.shadowBlur = 0;

  // Large cat
  const bobY = 350 + Math.sin(t * 2) * 7;
  drawCat(W / 2, bobY, 1.9, cat);

  // Floating hearts
  for (let i = 0; i < 4; i++) {
    const hx = W / 2 + Math.sin(t * 1.4 + i * 1.6) * 80;
    const hy = 180 + Math.sin(t * 1.1 + i * 0.8) * 20;
    ctx.fillStyle = '#FF6B6B';
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(t * 2 + i);
    ctx.font = `${22 + i * 4}px "Courier New"`;
    ctx.fillText('\u2665', hx, hy);
  }
  ctx.globalAlpha = 1;

  // Prompt
  const flashA = 0.4 + 0.5 * Math.sin(t * 2.5);
  ctx.fillStyle = `rgba(255,255,255,${flashA})`;
  ctx.font = '15px "Courier New"';
  ctx.fillText('Press any key or click to return to map', W / 2, H - 25);
  ctx.textAlign = 'left';
}

// ── Main game draw ─────────────────────────────────────────────────────────
function drawGame() {
  const lvl = LEVELS[currentLevelIdx];
  const cat = CATS[lvl.catIdx];
  const t   = Date.now() / 400;

  drawBackground(lvl);
  drawPlatforms(lvl);
  drawSpikes(lvl);

  // Cat in level (with glow + bob)
  const csx = lvl.catPos.x - camera.x;
  if (csx > -60 && csx < W + 60) {
    const glow = ctx.createRadialGradient(csx, lvl.catPos.y, 0, csx, lvl.catPos.y, 45);
    glow.addColorStop(0, 'rgba(255,220,80,0.45)');
    glow.addColorStop(1, 'rgba(255,220,80,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(csx, lvl.catPos.y, 45, 0, Math.PI*2); ctx.fill();
    drawCat(csx, lvl.catPos.y + Math.sin(t) * 5, 0.88, cat);
  }

  drawPlayer();

  // HUD bar
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.roundRect(8, 8, 218, 34, 7); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = '13px "Courier New"';
  ctx.fillText(`${lvl.name}  \u2022  find ${cat.name}!`, 18, 30);

  // Arrow to cat if off-screen
  if (lvl.catPos.x - camera.x > W + 20) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 17px "Courier New"';
    ctx.textAlign = 'right';
    ctx.fillText(`${cat.name} \u2192`, W - 14, 30);
    ctx.textAlign = 'left';
  }

  // ESC hint
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px "Courier New"';
  ctx.textAlign = 'right';
  ctx.fillText('[ESC] menu', W - 10, H - 10);
  ctx.textAlign = 'left';
}

// ── Collection button helpers ─────────────────────────────────────────────
const COLL_BTN = { x: W / 2 - 90, y: H - 52, w: 180, h: 30 };
function isCollectionBtn(mx, my) {
  return mx >= COLL_BTN.x && mx <= COLL_BTN.x + COLL_BTN.w &&
         my >= COLL_BTN.y && my <= COLL_BTN.y + COLL_BTN.h;
}

// ── Collection screen ─────────────────────────────────────────────────────
function drawCollection() {
  const t = Date.now() / 1000;

  // BG
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a1a3e'); bg.addColorStop(1, '#0d0d1e');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 90; i++) {
    const sx = (i * 97 + 3) % W;
    const sy = (i * 71 + 5) % (H * 0.52);
    const a = 0.2 + 0.6 * Math.sin(Date.now() / 500 + i * 0.7);
    ctx.fillStyle = `rgba(255,255,210,${a})`;
    ctx.fillRect(sx, sy, i % 5 === 0 ? 2.5 : 1.5, i % 5 === 0 ? 2.5 : 1.5);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 36px "Courier New"';
  ctx.shadowColor = '#FF8C00'; ctx.shadowBlur = 15;
  ctx.fillText('\u2665 Cat Collection \u2665', W / 2, 52);
  ctx.shadowBlur = 0;

  const count = rescued.size;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '13px "Courier New"';
  ctx.fillText(`${count} of ${CATS.length} cats rescued`, W / 2, 76);

  // Cat slots — one row of 4
  const slotW = 160, slotH = 300;
  const totalW = slotW * 4 + 20 * 3;
  const startX = (W - totalW) / 2;
  const startY = 95;

  for (let i = 0; i < CATS.length; i++) {
    const cat  = CATS[i];
    const lvl  = LEVELS[i];
    const done = rescued.has(i);
    const sx   = startX + i * (slotW + 20);
    const sy   = startY;

    // Slot BG
    ctx.fillStyle = done ? 'rgba(255,215,0,0.10)' : 'rgba(255,255,255,0.04)';
    ctx.strokeStyle = done ? '#FFD700' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = done ? 2 : 1;
    ctx.beginPath(); ctx.roundRect(sx, sy, slotW, slotH, 12); ctx.fill(); ctx.stroke();

    if (done) {
      // Full colour cat with bob
      const bobY = sy + 195 + Math.sin(t * 1.8 + i) * 5;
      drawCat(sx + slotW / 2, bobY, 1.1, cat);

      // Name
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 14px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText(cat.name, sx + slotW / 2, sy + 242);

      // Level
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = '10px "Courier New"';
      ctx.fillText(lvl.name, sx + slotW / 2, sy + 258);

      // Rescued badge
      ctx.fillStyle = 'rgba(255,215,0,0.18)';
      ctx.beginPath(); ctx.roundRect(sx + 20, sy + 268, slotW - 40, 20, 5); ctx.fill();
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 10px "Courier New"';
      ctx.fillText('\u2713 RESCUED', sx + slotW / 2, sy + 282);

    } else {
      // Silhouette — draw cat in dark grey
      ctx.save();
      ctx.globalAlpha = 0.18;
      drawCat(sx + slotW / 2, sy + 195, 1.1, { body: '#888', mark: '#666', eye: '#888', pattern: 'plain' });
      ctx.restore();

      // Question mark
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.font = 'bold 52px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText('?', sx + slotW / 2, sy + 175);

      // "Not yet found"
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '11px "Courier New"';
      ctx.fillText('not rescued yet', sx + slotW / 2, sy + 258);

      // Level hint
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '10px "Courier New"';
      ctx.fillText(`try: ${lvl.name}`, sx + slotW / 2, sy + 273);
    }
  }

  // Back button
  const flashA = 0.45 + 0.45 * Math.sin(t * 2.2);
  ctx.fillStyle = `rgba(255,255,255,${flashA})`;
  ctx.font = '14px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('\u2190 Press any key or click to go back', W / 2, H - 20);

  ctx.textAlign = 'left';
}

// ── Level start ───────────────────────────────────────────────────────────
function startLevel(idx) {
  currentLevelIdx = idx;
  initPlayer(idx);
  state = 'playing';
}

// ── Loop ──────────────────────────────────────────────────────────────────
function loop() {
  if (state === 'playing') {
    updateGame();
    drawGame();
  } else if (state === 'menu') {
    drawMenu();
  } else if (state === 'rescued') {
    drawRescued();
  } else if (state === 'collection') {
    drawCollection();
  }
  // Clear just-pressed after use each frame
  for (const k in justPressed) delete justPressed[k];
  requestAnimationFrame(loop);
}

initPlayer(0);
loop();
</script>
